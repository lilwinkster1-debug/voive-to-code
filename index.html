<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VoiceCode">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050508">
<title>Voice to Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" integrity="sha384-wH75j6z1lH97ZOpMOInqhgKzFkAInZPPSPlZpYKYTOqsaizPvhQZmAtLcPKXpLyH" crossorigin="anonymous">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" integrity="sha384-F/bZzf7p3Joyp5psL90p/p89AZJsndkSoGwRpXcZhleCWhd8SnRuoYo4d0yirjJp" crossorigin="anonymous"></script>
<style>
:root{
--bg:#050508;--surface:rgba(255,255,255,0.04);--surface-2:rgba(255,255,255,0.07);
--surface-3:rgba(255,255,255,0.1);--text:#f0eff4;--text-2:rgba(240,239,244,0.55);
--text-3:rgba(240,239,244,0.25);--warm:#ff6b35;--warm-soft:#ffa07a;
--cool:#5ce1e6;--cool-2:#7b68ee;--green:#3ddc84;--red:#ff4757;
--separator:rgba(255,255,255,0.06);--r:14px;
--font-sans:'Manrope',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
--font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Consolas,monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html{overscroll-behavior:none}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:env(safe-area-inset-top,20px) 16px calc(env(safe-area-inset-bottom,20px) + 16px);-webkit-font-smoothing:antialiased;overflow-x:hidden}
/* Ambient */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient-blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.15;transition:all 2s cubic-bezier(0.25,0.1,0.25,1);will-change:opacity;transform:translate3d(0,0,0)}
.ambient-blob.a{width:400px;height:400px;top:-100px;left:-100px;background:var(--warm)}
.ambient-blob.b{width:350px;height:350px;bottom:-80px;right:-80px;background:var(--cool-2)}
body.s-voice .ambient-blob.a{opacity:0.12;background:#ff6b35}
body.s-voice .ambient-blob.b{opacity:0.06;background:#7b68ee}
body.s-clarify .ambient-blob.a{opacity:0.1;background:#ffa07a}
body.s-clarify .ambient-blob.b{opacity:0.12;background:#5ce1e6}
body.s-gen .ambient-blob.a{opacity:0.06;background:#7b68ee}
body.s-gen .ambient-blob.b{opacity:0.18;background:#5ce1e6}
body.s-review .ambient-blob.a{opacity:0.08;background:#3ddc84}
body.s-review .ambient-blob.b{opacity:0.12;background:#5ce1e6}
body.s-saved .ambient-blob.a{opacity:0.1;background:#3ddc84}
body.s-saved .ambient-blob.b{opacity:0.08;background:#3ddc84}
.app{position:relative;z-index:1;width:100%;max-width:500px;display:flex;flex-direction:column;gap:14px;padding-bottom:20px}
/* Brand */
.brand{text-align:center;padding:8px 0 0}
.brand h1{font-size:24px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--warm-soft),var(--cool));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand p{font-size:12px;color:var(--text-3);margin-top:2px;letter-spacing:2px;text-transform:uppercase;font-weight:500}
/* Progress rail */
.rail{position:relative;height:3px;background:var(--separator);border-radius:2px;overflow:hidden}
.rail-fill{height:100%;border-radius:2px;width:0%;transition:width 0.8s cubic-bezier(0.25,0.1,0.25,1),background 0.8s;background:linear-gradient(90deg,var(--warm),var(--cool))}
.step-labels{display:flex;justify-content:space-between;margin-top:4px}
.step-lbl{font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-3);transition:color 0.5s}
.step-lbl.active{color:var(--text)}.step-lbl.done{color:var(--green)}
/* Cards */
.card{background:var(--surface);border:1px solid var(--separator);border-radius:var(--r);overflow:hidden;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transform:translate3d(0,0,0)}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 6px}
.card-head h2{font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:1.2px}
.card-inner{padding:0 16px 14px}
/* Buttons */
.ghost-btn{background:none;border:none;color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;padding:4px 0}
.ghost-btn:active{opacity:0.4}.ghost-btn.danger{color:var(--red)}
/* Settings */
.setting{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--separator)}
.setting:last-child{border-bottom:none}
.setting label{font-size:13px;font-weight:600;color:var(--text-2);min-width:38px}
.setting input[type="password"]{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--separator);border-radius:10px;padding:9px 12px;color:var(--text);font-size:14px;font-family:var(--font-mono)}
.setting input:focus{outline:none;box-shadow:0 0 0 2px var(--cool-2)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background 0.3s}.dot.ok{background:var(--green)}.dot.maybe{background:var(--warm)}
.setting select{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--separator);border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;-webkit-appearance:none;appearance:none}
.setting select:focus{outline:none;box-shadow:0 0 0 2px var(--cool-2)}
.toggle{position:relative;width:46px;height:28px;flex-shrink:0;background:rgba(255,255,255,0.1);border-radius:14px;cursor:pointer;border:none;padding:0;transition:background 0.3s}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform 0.3s cubic-bezier(0.25,0.1,0.25,1);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.toggle.on{background:var(--green)}.toggle.on::after{transform:translateX(18px)}
/* Orb */
.orb-area{display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px 0 8px}
.orb-wrap{position:relative;width:110px;height:110px}
.orb-glow{position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(circle,rgba(255,107,53,0.25) 0%,transparent 70%);transition:all 1s;will-change:opacity,transform;animation:glow-breathe 4s ease-in-out infinite}
@keyframes glow-breathe{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.15);opacity:1}}
.orb-ring{position:absolute;inset:-4px;border-radius:50%;border:1.5px solid rgba(255,107,53,0.2);transition:all 0.5s}
.orb-btn{width:110px;height:110px;border-radius:50%;border:none;cursor:pointer;position:relative;z-index:1;background:radial-gradient(circle at 35% 35%,rgba(255,150,100,0.3),transparent 60%),linear-gradient(145deg,#1a1520,#0d0b12);box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 8px 32px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;transition:transform 0.2s cubic-bezier(0.25,0.1,0.25,1)}
.orb-btn:active{transform:scale(0.93)}.orb-btn:focus-visible{outline:2px solid var(--text);outline-offset:6px}
.orb-icon{display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 0 12px rgba(255,107,53,0.5));transition:filter 0.5s}
/* Volume-reactive orb via CSS custom property --vol */
.orb-btn{transform:scale(calc(1 + var(--vol,0) * 0.15))}
body.listening .orb-glow{background:radial-gradient(circle,rgba(255,71,87,0.35) 0%,transparent 70%);animation:glow-pulse 1.2s ease-in-out infinite}
body.listening .orb-ring{border-color:rgba(255,71,87,0.4);animation:ring-expand 1.2s ease-in-out infinite}
body.listening .orb-btn{background:radial-gradient(circle at 35% 35%,rgba(255,100,100,0.35),transparent 60%),linear-gradient(145deg,#1a1015,#0d0508)}
body.listening .orb-icon{filter:drop-shadow(0 0 16px rgba(255,71,87,0.7))}
@keyframes glow-pulse{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.25);opacity:1}}
@keyframes ring-expand{0%,100%{inset:-4px;opacity:1}50%{inset:-20px;opacity:0.2}}
.orb-status{font-size:13px;color:var(--text-2);text-align:center;font-weight:500;min-height:18px;transition:color 0.3s}
body.listening .orb-status{color:var(--red)}
/* Speaking */
.speak-row{display:none;align-items:center;gap:8px;justify-content:center;font-size:13px;color:var(--cool-2);font-weight:500}
.speak-row.active{display:flex}
.bars{display:flex;gap:2px;align-items:center;height:16px}
.bars i{width:3px;background:var(--cool-2);border-radius:2px;animation:bar 0.7s ease-in-out infinite}
.bars i:nth-child(1){height:5px;animation-delay:0s}.bars i:nth-child(2){height:10px;animation-delay:0.08s}
.bars i:nth-child(3){height:16px;animation-delay:0.16s}.bars i:nth-child(4){height:10px;animation-delay:0.24s}
.bars i:nth-child(5){height:5px;animation-delay:0.32s}
@keyframes bar{0%,100%{transform:scaleY(0.35)}50%{transform:scaleY(1)}}
.speak-stop{background:none;border:1px solid var(--cool-2);color:var(--cool-2);font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;cursor:pointer;font-family:inherit}
/* Transcript */
.transcript{font-size:16px;line-height:1.6;min-height:44px;max-height:100px;overflow-y:auto;font-weight:400}
.transcript .ghost{color:var(--text-3);font-style:italic}
.hint{color:var(--text-3);font-size:14px;font-weight:400}
/* Error + Offline */
.error-box{background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.15);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--red);display:none;font-weight:500}
.error-box.visible{display:block}
.error-box button{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:var(--text);font-size:12px;font-weight:600;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:inherit;margin-top:6px}
.offline-bar{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--warm);color:#fff;text-align:center;font-size:12px;font-weight:600;padding:4px;transform:translateY(-100%);transition:transform 0.3s}
.offline-bar.show{transform:translateY(0)}
/* CTA */
.cta{width:100%;padding:15px;border:none;border-radius:var(--r);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.15s,transform 0.1s;letter-spacing:-0.3px}
.cta:active{transform:scale(0.98)}.cta:disabled{opacity:0.25;cursor:not-allowed;transform:none}.cta:focus-visible{outline:2px solid #fff;outline-offset:2px}
.cta.warm{background:linear-gradient(135deg,var(--warm),#e84118)}
.cta.cool{background:linear-gradient(135deg,var(--cool-2),var(--cool))}
.cta.mint{background:linear-gradient(135deg,#2ed573,var(--green));color:#050508}
/* Chat */
.chat-flow{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;padding:4px 0}
.bbl{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;max-width:85%;animation:bbl-in 0.25s ease;font-weight:400;contain:content}
@keyframes bbl-in{from{opacity:0;transform:translateY(6px) scale(0.97)}to{opacity:1;transform:none}}
.bbl.ai{background:var(--surface-2);align-self:flex-start;border-bottom-left-radius:6px}
.bbl.user{background:linear-gradient(135deg,rgba(255,107,53,0.2),rgba(123,104,238,0.15));align-self:flex-end;border-bottom-right-radius:6px}
.bbl.system{background:rgba(61,220,132,0.1);color:var(--green);align-self:center;border-radius:10px;font-size:12px;font-weight:600}
.bbl .tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-3);margin-bottom:3px}
/* Compose */
.compose{display:flex;gap:8px;align-items:center;padding:8px 0 0}
.compose-field{flex:1;background:var(--surface-2);border:1px solid var(--separator);border-radius:22px;padding:10px 16px;color:var(--text);font-size:16px;font-family:inherit}
.compose-field:focus{outline:none;border-color:rgba(255,255,255,0.15)}
.compose-field::placeholder{color:var(--text-3)}
.pill-btn{height:36px;border-radius:18px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:transform 0.1s;padding:0 14px;font-family:inherit}
.pill-btn:active{transform:scale(0.9)}
.pill-btn.mic{background:none;border:1.5px solid var(--separator);color:var(--text-2);width:36px;padding:0}
.pill-btn.mic.active{border-color:var(--red);color:var(--red)}
.pill-btn.go{background:linear-gradient(135deg,var(--warm),var(--cool-2));color:#fff;font-weight:600;width:36px;padding:0}
/* Code */
.tabs-row{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--separator)}
.tab{padding:10px 14px;font-size:12px;font-family:var(--font-mono);background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-3);cursor:pointer;white-space:nowrap;font-weight:500;transition:all 0.2s}
.tab.active{color:var(--cool);border-bottom-color:var(--cool)}.tab:active{opacity:0.4}
.file-note{font-size:11px;color:var(--text-3);padding:6px 16px;font-style:italic}
.code-box{background:#0d1117;border-radius:0 0 var(--r) var(--r);overflow:auto;max-height:300px;-webkit-overflow-scrolling:touch;contain:layout paint}
.code-box pre{margin:0;padding:14px;font-size:12px;line-height:1.55}
.code-box code{font-family:var(--font-mono)}
.review-btns{display:flex;gap:8px;padding:12px 16px}
.review-btns .cta{flex:1;font-size:14px;padding:12px}
.prog-track{width:100%;height:3px;background:var(--separator);border-radius:2px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--cool-2),var(--cool));width:0%;transition:width 0.5s;border-radius:2px}
.gen-lbl{font-size:13px;color:var(--text-2);text-align:center;padding:8px 0;font-weight:500}
/* Done */
.done-box{background:rgba(61,220,132,0.06);border:1px solid rgba(61,220,132,0.12);border-radius:var(--r);padding:16px;text-align:center}
.done-box p{color:var(--green);font-size:15px;font-weight:600;margin-bottom:10px}
.dl-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.dl-tag{padding:8px 14px;background:rgba(61,220,132,0.08);border:1px solid rgba(61,220,132,0.15);border-radius:8px;color:var(--green);font-size:12px;font-family:var(--font-mono);text-decoration:none;cursor:pointer;font-weight:500}
.dl-tag:active{background:rgba(61,220,132,0.15)}
/* Projects */
.proj-scroll{display:flex;gap:8px;overflow-x:auto;padding:2px 0 6px;-webkit-overflow-scrolling:touch}
.proj{flex-shrink:0;padding:10px 14px;background:var(--surface-2);border-radius:12px;cursor:pointer;transition:background 0.15s;max-width:180px;display:flex;flex-direction:column;gap:3px;border:1px solid var(--separator)}
.proj:active{background:var(--surface-3)}
.proj .pn{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj .pt{font-size:10px;color:var(--text-3);font-weight:500}
.proj .px{font-size:10px;color:var(--text-3);cursor:pointer;align-self:flex-end;padding:2px 4px}.proj .px:active{color:var(--red)}
.dots span{display:inline-block;width:7px;height:7px;margin:0 3px;border-radius:50%;animation:dot-up 1.2s infinite}
.dots span:nth-child(1){background:var(--warm);animation-delay:0s}
.dots span:nth-child(2){background:var(--cool-2);animation-delay:0.15s}
.dots span:nth-child(3){background:var(--cool);animation-delay:0.3s}
@keyframes dot-up{0%,80%,100%{transform:translateY(0);opacity:0.3}40%{transform:translateY(-10px);opacity:1}}
.hidden{display:none!important}
.footer{margin-top:auto;padding-top:20px;font-size:10px;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
/* Reduced motion */
@media(prefers-reduced-motion:reduce){
*{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}
.orb-glow{opacity:0.4!important}.ambient-blob{transition:none!important}
html{scroll-behavior:auto!important}
}
/* Screen reader only */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
</style>
</head>
<body class="s-voice">
<div class="ambient"><div class="ambient-blob a"></div><div class="ambient-blob b"></div></div>
<div class="offline-bar" id="offlineBar" role="alert">You are offline</div>
<div class="app">
<div class="brand"><h1>Voice to Code</h1><p>Speak it into existence</p></div>
<!-- Progress -->
<div><div class="rail"><div class="rail-fill" id="railFill"></div></div>
<div class="step-labels"><span class="step-lbl active" data-s="0">Voice</span><span class="step-lbl" data-s="1">Clarify</span><span class="step-lbl" data-s="2">Generate</span><span class="step-lbl" data-s="3">Review</span><span class="step-lbl" data-s="4">Saved</span></div></div>
<!-- Settings -->
<div class="card">
<div class="setting"><label>Key</label><input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false"><div class="dot" id="keyDot"></div></div>
<div class="setting"><label>Voice</label><select id="voiceSelect"><option value="">Loading...</option></select></div>
<div class="setting"><label>TTS</label><div style="flex:1"></div><button class="toggle on" id="ttsToggle" aria-label="Toggle TTS"></button></div>
</div>
<!-- Projects -->
<div class="card" id="projectsPanel">
<div class="card-head"><h2>Projects</h2><button class="ghost-btn danger" id="clearProjectsBtn">Clear All</button></div>
<div class="card-inner"><div class="proj-scroll" id="projectsList"><span class="hint">No saved projects</span></div></div>
</div>
<!-- Orb -->
<div class="orb-area">
<div class="orb-wrap"><div class="orb-glow"></div><div class="orb-ring"></div>
<button class="orb-btn" id="micBtn" aria-label="Start listening"><span class="orb-icon"><svg width="38" height="38" viewBox="0 0 38 38" fill="none"><path d="M19 4v30M12 10v18M5 15v8M26 10v18M33 15v8" stroke="url(#og)" stroke-width="2.8" stroke-linecap="round"/><defs><linearGradient id="og" x1="5" y1="4" x2="33" y2="34"><stop stop-color="#ffa07a"/><stop offset="1" stop-color="#5ce1e6"/></linearGradient></defs></svg></span></button>
</div>
<p class="orb-status" id="status" role="status" aria-live="polite">Tap the orb to speak</p>
</div>
<!-- Speaking -->
<div class="speak-row" id="speakingIndicator"><div class="bars"><i></i><i></i><i></i><i></i><i></i></div><span>Speaking</span><button class="speak-stop" id="stopSpeaking">Stop</button></div>
<!-- ARIA announcer -->
<div id="ariaAnnounce" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
<!-- Error -->
<div class="error-box" id="error" role="alert" aria-live="assertive"></div>
<!-- Transcript -->
<div class="card" id="transcriptPanel">
<div class="card-head"><h2>Your Idea</h2><button class="ghost-btn" id="clearBtn">Clear</button></div>
<div class="card-inner">
<div class="transcript" id="transcript"><span class="hint">Speak or type your idea...</span></div>
<div class="compose" style="padding-top:10px"><input type="text" class="compose-field" id="ideaInput" placeholder="Or type your idea here..."><button class="pill-btn go" id="ideaAdd" aria-label="Add text">+</button></div>
</div>
</div>
<button class="cta warm" id="sendBtn" disabled>Send to Claude</button>
<!-- Chat -->
<div class="card hidden" id="chatPanel">
<div class="card-head"><h2>Clarification</h2><button class="ghost-btn" id="resetChat">New Idea</button></div>
<div class="card-inner">
<div class="chat-flow" id="chatArea" role="log" aria-live="polite"></div>
<div class="compose hidden" id="replyBar">
<button class="pill-btn mic" id="replyMicBtn" aria-label="Voice reply"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M5 4.5v7M2 6.5v3M11 4.5v7M14 6.5v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
<input type="text" class="compose-field" id="replyInput" placeholder="Type your answer...">
<button class="pill-btn go" id="replySend" aria-label="Send">&#x2191;</button>
</div>
</div>
</div>
<button class="cta cool hidden" id="generateBtn">Generate Code</button>
<!-- Code -->
<div class="card hidden" id="codePanel">
<div class="card-head"><h2>Generated Code</h2><div style="display:flex;gap:14px"><button class="ghost-btn" id="downloadAllBtn">Download</button><button class="ghost-btn" id="resetChat2">New</button></div></div>
<div class="card-inner">
<div class="prog-track hidden" id="genProgress"><div class="prog-bar" id="genProgressBar"></div></div>
<p class="gen-lbl hidden" id="genStatus"></p>
<div class="hidden" id="codeOutput"><div class="tabs-row" id="fileTabs"></div><div class="file-note" id="fileDesc"></div><div class="code-box" id="codeView"><pre><code id="codeContent"></code></pre></div></div>
</div>
<div class="review-btns hidden" id="reviewRow"><button class="cta mint" id="approveBtn">Approve</button><button class="cta warm" id="tweakBtn">Tweak</button></div>

<button class="pill-btn mic" id="tweakMicBtn" aria-label="Voice tweak"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M5 4.5v7M2 6.5v3M11 4.5v7M14 6.5v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
<input type="text" class="compose-field" id="tweakInput" placeholder="Describe the change..."><button class="pill-btn go" id="tweakSend" aria-label="Send tweak">&#x2191;</button>
</div>
</div>
<!-- Done -->
<div class="done-box hidden" id="downloadPanel"><p>Project saved!</p><div class="dl-row" id="downloadLinks"></div></div>
</div>
<p class="footer">Voice to Code</p>

<script>
(function(){
var G=function(id){return document.getElementById(id)};
var apiKeyInput=G('apiKey'),keyDot=G('keyDot'),micBtn=G('micBtn'),statusEl=G('status'),
errorEl=G('error'),transcriptEl=G('transcript'),clearBtn=G('clearBtn'),sendBtn=G('sendBtn'),
chatPanel=G('chatPanel'),chatArea=G('chatArea'),replyBar=G('replyBar'),replyInput=G('replyInput'),
replySend=G('replySend'),replyMicBtn=G('replyMicBtn'),resetChat=G('resetChat'),resetChat2=G('resetChat2'),
generateBtn=G('generateBtn'),codePanel=G('codePanel'),genProgress=G('genProgress'),
genProgressBar=G('genProgressBar'),genStatus=G('genStatus'),codeOutput=G('codeOutput'),
fileTabs=G('fileTabs'),fileDesc=G('fileDesc'),codeContent=G('codeContent'),
approveBtn=G('approveBtn'),tweakBtn=G('tweakBtn'),tweakBar=G('tweakBar'),reviewRow=G('reviewRow'),
tweakInput=G('tweakInput'),tweakSend=G('tweakSend'),tweakMicBtn=G('tweakMicBtn'),
downloadAllBtn=G('downloadAllBtn'),downloadPanel=G('downloadPanel'),downloadLinks=G('downloadLinks'),
voiceSelect=G('voiceSelect'),ttsToggle=G('ttsToggle'),railFill=G('railFill'),
speakingIndicator=G('speakingIndicator'),stopSpeakingBtn=G('stopSpeaking'),
projectsList=G('projectsList'),clearProjectsBtn=G('clearProjectsBtn'),
ideaInput=G('ideaInput'),ideaAdd=G('ideaAdd'),offlineBar=G('offlineBar'),ariaAnnounce=G('ariaAnnounce');

var finalText='',listening=false,lastInterim='';
var conversationHistory=[],codeGenHistory=[],awaitingReply=false;
var generatedFiles=[],activeFileIdx=0,clarifiedRequirements='',currentStep=0;
var ttsEnabled=true,isSpeaking=false,savedProjects=[];
var STEP_CLASSES=['s-voice','s-clarify','s-gen','s-review','s-saved'];
var audioCtx=null,analyser=null,volRaf=null;

/* ===== ARIA ANNOUNCE ===== */
function announce(msg){ariaAnnounce.textContent='';setTimeout(function(){ariaAnnounce.textContent=msg},50);}

/* ===== OFFLINE DETECTION ===== */
function checkOnline(){offlineBar.classList.toggle('show',!navigator.onLine);}
window.addEventListener('online',checkOnline);window.addEventListener('offline',checkOnline);checkOnline();

/* ===== STEPS ===== */
function setStep(n){
currentStep=n;railFill.style.width=(n*25)+'%';
var lbls=document.querySelectorAll('.step-lbl');
for(var i=0;i<lbls.length;i++){lbls[i].classList.remove('active','done');if(i<n)lbls[i].classList.add('done');else if(i===n)lbls[i].classList.add('active');}
for(var c=0;c<STEP_CLASSES.length;c++)document.body.classList.remove(STEP_CLASSES[c]);
if(STEP_CLASSES[n])document.body.classList.add(STEP_CLASSES[n]);
}

/* ===== TECH DICTIONARY ===== */
var TECH_DICT=[
['a sink','async'],['a weight','await'],['a wait','await'],['use state','useState'],
['use effect','useEffect'],['use ref','useRef'],['use memo','useMemo'],
['web pack','webpack'],['graph cool','GraphQL'],['jason','JSON'],['sequel','SQL'],
['j query','jQuery'],['next JS','Next.js'],['next j s','Next.js'],['react JS','React.js'],
['node JS','Node.js'],['type script','TypeScript'],['java script','JavaScript'],
['my sequel','MySQL'],['post gress','Postgres'],['pie thon','Python'],
['c sharp','C#'],['see sharp','C#'],['no JS','Node.js'],['API in point','API endpoint'],
['function all','functional'],['para meter','parameter'],['argue meant','argument'],
['boullion','boolean'],['bull Ian','boolean'],['numb','npm'],['get hub','GitHub'],
['in line','inline'],['cass cade','cascade'],['high jacks','AJAX']
];
TECH_DICT.sort(function(a,b){return b[0].length-a[0].length});

function correctTechTerms(text){
var result=text;
for(var i=0;i<TECH_DICT.length;i++){
var re=new RegExp(TECH_DICT[i][0],'gi');
result=result.replace(re,TECH_DICT[i][1]);
}
return result;
}

/* ===== TTS ===== */
var synth=window.speechSynthesis;var voices=[];
function loadVoices(){
voices=synth.getVoices();voiceSelect.innerHTML='';
if(!voices.length){voiceSelect.innerHTML='<option>No voices</option>';return;}
var en=voices.filter(function(v){return v.lang.startsWith('en')});
var other=voices.filter(function(v){return !v.lang.startsWith('en')});
var sorted=en.concat(other);var picked=false;
for(var i=0;i<sorted.length;i++){var v=sorted[i];var opt=document.createElement('option');opt.value=voices.indexOf(v);opt.textContent=v.name+' ('+v.lang+')';
if(!picked&&v.lang.startsWith('en')){opt.selected=true;picked=true;}
voiceSelect.appendChild(opt);}
}
if(synth){loadVoices();synth.onvoiceschanged=loadVoices;}
function speak(text){
if(!ttsEnabled||!synth||!text)return;synth.cancel();
var clean=text.replace(/READY TO BUILD/g,'Ready to build.').replace(/[^\w\s.,!?;:'\-()\/]/g,' ').replace(/\s+/g,' ').trim();
if(!clean)return;var idx=parseInt(voiceSelect.value);
if(clean.length>200){var sentences=clean.match(/[^.!?]+[.!?]+/g)||[clean];var first=true;
for(var s=0;s<sentences.length;s++){var u=new SpeechSynthesisUtterance(sentences[s].trim());if(voices[idx])u.voice=voices[idx];u.rate=1;u.pitch=1;if(first){u.onstart=function(){isSpeaking=true;speakingIndicator.classList.add('active')};first=false;}synth.speak(u);}
var last=new SpeechSynthesisUtterance('');last.onend=function(){isSpeaking=false;speakingIndicator.classList.remove('active')};synth.speak(last);
}else{var utt=new SpeechSynthesisUtterance(clean);if(voices[idx])utt.voice=voices[idx];utt.rate=1;utt.pitch=1;
utt.onstart=function(){isSpeaking=true;speakingIndicator.classList.add('active')};utt.onend=function(){isSpeaking=false;speakingIndicator.classList.remove('active')};utt.onerror=function(){isSpeaking=false;speakingIndicator.classList.remove('active')};synth.speak(utt);}
}
ttsToggle.addEventListener('click',function(){ttsEnabled=!ttsEnabled;ttsToggle.classList.toggle('on',ttsEnabled);if(!ttsEnabled&&synth){synth.cancel();isSpeaking=false;speakingIndicator.classList.remove('active');}});
stopSpeakingBtn.addEventListener('click',function(){if(synth)synth.cancel();isSpeaking=false;speakingIndicator.classList.remove('active');});

/* ===== VOLUME-REACTIVE ORB ===== */
function startVolumeMeter(){
try{
if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:16000,latencyHint:'playback'});
if(audioCtx.state==='suspended')audioCtx.resume();
navigator.mediaDevices.getUserMedia({audio:{noiseSuppression:true,echoCancellation:true}}).then(function(stream){
if(!analyser){analyser=audioCtx.createAnalyser();analyser.fftSize=256;analyser.smoothingTimeConstant=0.8;}
var src=audioCtx.createMediaStreamSource(stream);src.connect(analyser);
var data=new Uint8Array(analyser.frequencyBinCount);
function tick(){
analyser.getByteFrequencyData(data);
var sum=0;for(var i=0;i<data.length;i++)sum+=data[i];
var vol=sum/data.length/255;
micBtn.style.setProperty('--vol',vol.toFixed(3));
if(listening)volRaf=requestAnimationFrame(tick);
else{micBtn.style.setProperty('--vol','0');stream.getTracks().forEach(function(t){t.stop()});}
}
tick();
}).catch(function(){});
}catch(e){}
}
function stopVolumeMeter(){
if(volRaf){cancelAnimationFrame(volRaf);volRaf=null;}
micBtn.style.setProperty('--vol','0');
if(audioCtx&&audioCtx.state==='running')audioCtx.suspend();
}

/* ===== SPEECH RECOGNITION ===== */
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){showError('Speech recognition not supported. Use Chrome, Edge, or Safari.',null);micBtn.disabled=true;micBtn.style.opacity='0.4';return;}
var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
function mkRec(){
var r=new SR();r.continuous=!isIOS;r.interimResults=true;r.lang='en-US';r.maxAlternatives=3;
/* Chrome phrases API for tech vocabulary */
if('phrases' in r){
try{
var SRP=window.SpeechRecognitionPhrase;
if(SRP){
r.phrases=[
new SRP('async',8),new SRP('await',8),new SRP('useState',9),new SRP('useEffect',9),
new SRP('TypeScript',7),new SRP('JavaScript',7),new SRP('GraphQL',8),new SRP('webpack',7),
new SRP('npm',8),new SRP('API',6),new SRP('JSON',7),new SRP('SQL',7),
new SRP('React',6),new SRP('Node.js',7),new SRP('Python',6),new SRP('GitHub',6)
];
r.processLocally=true;
}
}catch(e){}
}
return r;
}
var recognition=mkRec(),replyRec=mkRec(),tweakRec=mkRec();

/* API key with persistence */
apiKeyInput.addEventListener('input',function(){var v=apiKeyInput.value.trim();if(v.startsWith('sk-ant-')){keyDot.className='dot ok';try{localStorage.setItem('vtc_key',v);}catch(e){}}else if(v.length>0){keyDot.className='dot maybe';}else{keyDot.className='dot';try{localStorage.removeItem('vtc_key');}catch(e){}}updateSendBtn();});
try{var savedKey=localStorage.getItem('vtc_key');if(savedKey){apiKeyInput.value=savedKey;keyDot.className='dot ok';}}catch(e){}

/* Main mic */
var wantListening=false;
function stopCleanup(){
listening=false;wantListening=false;document.body.classList.remove('listening');
stopVolumeMeter();
var visible=transcriptEl.textContent.trim();
if(visible&&!finalText.trim()){finalText=visible+' ';}
else if(visible&&finalText.trim()&&visible.length>finalText.trim().length){finalText=visible+' ';}
/* Apply tech dictionary correction */
if(finalText.trim()){finalText=correctTechTerms(finalText);transcriptEl.innerHTML='';var s=document.createElement('span');s.textContent=finalText;transcriptEl.appendChild(s);}
lastInterim='';statusEl.textContent=finalText.trim()?'Done \u2014 tap Send':'Tap the orb to speak';
announce(finalText.trim()?'Recording stopped. Tap send to continue.':'Recording stopped.');
updateSendBtn();
}

micBtn.addEventListener('click',function(){
if(isSpeaking&&synth)synth.cancel();
if(navigator.vibrate)navigator.vibrate(25);
if(listening||wantListening){wantListening=false;try{recognition.stop();}catch(e){}setTimeout(function(){if(listening)stopCleanup()},500);}
else{if(transcriptEl.querySelector('.hint'))transcriptEl.innerHTML='';hideError();wantListening=true;
startVolumeMeter();
try{recognition.start();}catch(e){try{recognition.stop();}catch(e2){}setTimeout(function(){try{recognition.start();}catch(e3){showError('Mic error: '+e3.message,null);}},200);}}
});
recognition.addEventListener('start',function(){listening=true;document.body.classList.add('listening');statusEl.textContent='Listening...';announce('Recording started. Speak your idea.');});
recognition.addEventListener('end',function(){listening=false;document.body.classList.remove('listening');if(isIOS&&wantListening){try{recognition.start();}catch(e){stopCleanup();}}else{stopCleanup();}});

var silenceTimer=null;
function resetSilenceTimer(){if(silenceTimer)clearTimeout(silenceTimer);if(!wantListening)return;silenceTimer=setTimeout(function(){if(wantListening&&(finalText.trim()||lastInterim)){wantListening=false;try{recognition.stop();}catch(e){}setTimeout(function(){if(listening)stopCleanup()},500);}},2500);}

recognition.addEventListener('result',function(e){var interim='',acc='';for(var i=0;i<e.results.length;i++){if(e.results[i].isFinal)acc+=e.results[i][0].transcript+' ';else interim+=e.results[i][0].transcript;}if(acc){finalText+=acc;lastInterim='';}else{lastInterim=interim;}transcriptEl.innerHTML='';if(finalText){var s=document.createElement('span');s.textContent=finalText;transcriptEl.appendChild(s);}if(interim){var g=document.createElement('span');g.className='ghost';g.textContent=interim;transcriptEl.appendChild(g);}transcriptEl.scrollTop=transcriptEl.scrollHeight;updateSendBtn();resetSilenceTimer();});
recognition.addEventListener('error',function(e){if(e.error==='not-allowed')showError('Microphone denied. Check browser settings.',null);else if(e.error!=='no-speech'&&e.error!=='aborted')showError('Speech error: '+e.error,'retry');listening=false;wantListening=false;document.body.classList.remove('listening');stopVolumeMeter();var visible=transcriptEl.textContent.trim();if(visible&&!finalText.trim()){finalText=visible+' ';}if(finalText.trim()){finalText=correctTechTerms(finalText);transcriptEl.innerHTML='';var s=document.createElement('span');s.textContent=finalText;transcriptEl.appendChild(s);}lastInterim='';statusEl.textContent=finalText.trim()?'Done \u2014 tap Send':'Tap the orb to speak';updateSendBtn();});

/* Reply/tweak mic */
function wireVoice(btn,rec,input){
var rl=false,rw=false;
btn.addEventListener('click',function(){if(isSpeaking&&synth)synth.cancel();if(rl||rw){rw=false;try{rec.stop();}catch(e){}setTimeout(function(){if(rl){rl=false;btn.classList.remove('active');}},500);}else{rw=true;try{rec.start();}catch(e){rw=false;}}});
rec.addEventListener('start',function(){rl=true;rw=true;btn.classList.add('active');});
rec.addEventListener('end',function(){rl=false;btn.classList.remove('active');if(isIOS&&rw){try{rec.start();}catch(e){rw=false;}}else{rw=false;}});
rec.addEventListener('result',function(e){var t='';for(var i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;input.value=correctTechTerms(t);});
rec.addEventListener('error',function(){rl=false;rw=false;btn.classList.remove('active');});
return{isOn:function(){return rl},off:function(){rw=false;try{rec.stop();}catch(e){}}};
}
var replyVoice=wireVoice(replyMicBtn,replyRec,replyInput);
var tweakVoice=wireVoice(tweakMicBtn,tweakRec,tweakInput);

/* Keyboard input */
clearBtn.addEventListener('click',function(){finalText='';lastInterim='';ideaInput.value='';transcriptEl.innerHTML='<span class="hint">Speak or type your idea...</span>';updateSendBtn();});
function addTypedIdea(){var text=ideaInput.value.trim();if(!text)return;finalText+=text+' ';ideaInput.value='';transcriptEl.innerHTML='';var s=document.createElement('span');s.textContent=finalText;transcriptEl.appendChild(s);transcriptEl.scrollTop=transcriptEl.scrollHeight;updateSendBtn();}
ideaAdd.addEventListener('click',addTypedIdea);
ideaInput.addEventListener('keydown',function(e){if(e.key==='Enter')addTypedIdea();});
ideaInput.addEventListener('input',function(){var combo=(finalText+ideaInput.value).trim();sendBtn.disabled=!(combo&&apiKeyInput.value.trim());});
function updateSendBtn(){sendBtn.disabled=!((finalText.trim()||ideaInput.value.trim())&&apiKeyInput.value.trim());}

/* ===== MODEL ROUTING — Haiku for clarify (67% cheaper), Sonnet for code ===== */
function getModel(task){return task==='clarify'?'claude-haiku-4-5-20251001':'claude-sonnet-4-20250514';}
function getMaxTok(task){return task==='clarify'?512:8192;}

/* ===== PROMPTS ===== */
var CLARIFY_PROMPT='You are the clarification layer of a voice-to-code system. The user speaks an idea for a program, app, or script, and your ONLY job is to make sure the requirements are crystal clear before any code is generated.\n\nRules:\n1. Read the user\'s idea carefully.\n2. If clear enough to build immediately, respond with EXACTLY:\n   READY TO BUILD\n   [One-sentence summary]\n3. If ambiguous, ask 1-3 SHORT, specific clarifying questions. Number them.\n4. Conversational, encouraging tone. User may not be technical.\n5. Never generate code. Never suggest architecture. Just clarify.\n6. After answers, either ask follow-ups or respond with READY TO BUILD format.\n7. Focus on: What does it do? Who uses it? What inputs/outputs? Requirements?\n8. Keep responses concise.';

var CODE_PROMPT='You are the code generation layer of a voice-to-code system. Given clarified requirements, generate the COMPLETE implementation.\n\nCRITICAL: Your entire response must be valid JSON. No text before or after. No markdown fences.\n\nOutput format:\n{"files":[{"name":"filename.ext","description":"Purpose","language":"html","content":"file contents"}],"summary":"One sentence summary"}\n\nRules:\n1. Generate complete, working, production-quality code.\n2. Include ALL necessary files.\n3. Modern best practices, clean style, helpful comments.\n4. For web projects: work by opening HTML directly (no build step).\n5. Code must be immediately runnable.\n6. Escape special characters properly in JSON strings.';

/* ===== STREAMING API with rAF batching ===== */
function StreamRenderer(el){this.el=el;this.q='';this.raf=false;}
StreamRenderer.prototype.push=function(text){
this.q+=text;
if(!this.raf){var self=this;this.raf=true;requestAnimationFrame(function(){self.el.textContent+=self.q;self.q='';self.raf=false;chatArea.scrollTop=chatArea.scrollHeight;});}
};

function callClaudeStream(messages,systemPrompt,task,onChunk){
var apiKey=apiKeyInput.value.trim();
if(!apiKey)return Promise.reject(new Error('No API key'));
if(!navigator.onLine)return Promise.reject(new Error('You appear offline. Check your connection.'));
var model=getModel(task);var maxTok=getMaxTok(task);
var timeoutMs=task==='clarify'?30000:90000;
var controller=new AbortController();var timer=setTimeout(function(){controller.abort()},timeoutMs);
return fetch('https://api.anthropic.com/v1/messages',{method:'POST',signal:controller.signal,
headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
body:JSON.stringify({model:model,max_tokens:maxTok,stream:true,system:[{type:'text',text:systemPrompt,cache_control:{type:'ephemeral'}}],messages:messages})
}).then(function(r){clearTimeout(timer);
if(r.status===429){return retryWithBackoff(function(){return callClaudeStream(messages,systemPrompt,task,onChunk)},r);}
if(!r.ok)return r.json().catch(function(){return {}}).then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status)});
var reader=r.body.getReader();var decoder=new TextDecoder();var full='',buf='',evType='';
function pump(){
return reader.read().then(function(result){
if(result.done)return full;
buf+=decoder.decode(result.value,{stream:true});
var lines=buf.split('\n');buf=lines.pop();
for(var i=0;i<lines.length;i++){
var line=lines[i].trim();
if(line.indexOf('event: ')===0)evType=line.slice(7).trim();
else if(line.indexOf('data: ')===0&&evType){
try{var d=JSON.parse(line.slice(6));
if(evType==='content_block_delta'&&d.delta&&d.delta.text){full+=d.delta.text;if(onChunk)onChunk(d.delta.text);}
if(evType==='message_stop'&&onChunk)onChunk('');
if(evType==='error')throw new Error(d.error&&d.error.message||'Stream error');
}catch(e){if(e.message&&e.message!=='Stream error'){/* JSON parse error, skip */}else throw e;}
evType='';
}
}
return pump();
});
}
return pump();
}).catch(function(err){clearTimeout(timer);if(err.name==='AbortError')throw new Error('Request timed out. Try again.');throw err;});
}

/* Non-streaming fallback for code gen (needs full JSON) */
function callClaude(messages,systemPrompt,task,retries){
var apiKey=apiKeyInput.value.trim();
if(!apiKey)return Promise.reject(new Error('No API key'));
if(!navigator.onLine)return Promise.reject(new Error('You appear offline.'));
var model=getModel(task);var maxTok=getMaxTok(task);
var timeoutMs=task==='clarify'?30000:90000;
var controller=new AbortController();var timer=setTimeout(function(){controller.abort()},timeoutMs);
return fetch('https://api.anthropic.com/v1/messages',{method:'POST',signal:controller.signal,
headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
body:JSON.stringify({model:model,max_tokens:maxTok,system:[{type:'text',text:systemPrompt,cache_control:{type:'ephemeral'}}],messages:messages})
}).then(function(r){clearTimeout(timer);
if(r.status===429&&(!retries||retries<3)){return retryWithBackoff(function(){return callClaude(messages,systemPrompt,task,(retries||0)+1)},r);}
if(!r.ok)return r.json().catch(function(){return {}}).then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status)});
return r.json().then(function(d){return d.content[0].text});
}).catch(function(err){clearTimeout(timer);if(err.name==='AbortError')throw new Error('Request timed out.');throw err;});
}

/* ===== EXPONENTIAL BACKOFF WITH JITTER ===== */
function retryWithBackoff(fn,response){
var retryAfter=response&&response.headers?parseInt(response.headers.get('retry-after')||'3'):3;
var delay=Math.min(retryAfter*1000,15000);
var jitter=Math.random()*1000;
return new Promise(function(res){setTimeout(res,delay+jitter)}).then(fn);
}

/* ===== CLARIFICATION ===== */
sendBtn.addEventListener('click',function(){if(ideaInput.value.trim()){finalText+=ideaInput.value.trim()+' ';ideaInput.value='';}var idea=finalText.trim();if(!idea||!apiKeyInput.value.trim())return;startClarify(idea);});

function startClarify(idea){
setStep(1);chatPanel.classList.remove('hidden');chatArea.innerHTML='';conversationHistory=[];generateBtn.classList.add('hidden');
addBbl('user',idea);conversationHistory.push({role:'user',content:'Here\'s my idea: '+idea});
var stream=addStreamBbl();sendBtn.disabled=true;announce('Sending to Claude for clarification.');
callClaudeStream(conversationHistory,CLARIFY_PROMPT,'clarify',function(chunk){stream.push(chunk);}).then(function(reply){
conversationHistory.push({role:'assistant',content:reply});speak(reply);
if(reply.indexOf('READY TO BUILD')!==-1){clarifiedRequirements=reply;addBbl('system','Requirements confirmed');generateBtn.classList.remove('hidden');replyBar.classList.add('hidden');awaitingReply=false;announce('Requirements confirmed. Ready to generate code.');}
else{replyBar.classList.remove('hidden');replyInput.focus();awaitingReply=true;announce('Claude has questions. Type or speak your answer.');}
}).catch(function(err){stream.el.remove();showError('API error: '+err.message,'retry');});chatArea.scrollTop=chatArea.scrollHeight;
}
function sendReply(){
var text=replyInput.value.trim();if(!text||!awaitingReply)return;replyInput.value='';if(replyVoice.isOn())replyVoice.off();
addBbl('user',text);conversationHistory.push({role:'user',content:text});var stream=addStreamBbl();replyBar.classList.add('hidden');
callClaudeStream(conversationHistory,CLARIFY_PROMPT,'clarify',function(chunk){stream.push(chunk);}).then(function(reply){
conversationHistory.push({role:'assistant',content:reply});speak(reply);
if(reply.indexOf('READY TO BUILD')!==-1){clarifiedRequirements=reply;addBbl('system','Requirements confirmed');generateBtn.classList.remove('hidden');awaitingReply=false;announce('Requirements confirmed.');}
else{replyBar.classList.remove('hidden');replyInput.focus();awaitingReply=true;}
}).catch(function(err){stream.el.remove();showError('API error: '+err.message,'retry');replyBar.classList.remove('hidden');});chatArea.scrollTop=chatArea.scrollHeight;
}
replySend.addEventListener('click',sendReply);replyInput.addEventListener('keydown',function(e){if(e.key==='Enter')sendReply();});

/* ===== CODE GEN (non-streaming for JSON parsing) ===== */
generateBtn.addEventListener('click',startGen);
function startGen(){
setStep(2);generateBtn.classList.add('hidden');codePanel.classList.remove('hidden');codeOutput.classList.add('hidden');reviewRow.classList.add('hidden');
genProgress.classList.remove('hidden');genStatus.classList.remove('hidden');genStatus.textContent='Claude is writing code...';genProgressBar.style.width='20%';downloadPanel.classList.add('hidden');
speak('Generating your code now.');announce('Code generation started.');
var ctx=conversationHistory.map(function(m){return m.role+': '+m.content}).join('\n');
codeGenHistory=[{role:'user',content:'Clarified requirements:\n\n'+ctx+'\n\nFinal: '+clarifiedRequirements+'\n\nGenerate the complete code. Respond with ONLY valid JSON.'}];
genProgressBar.style.width='50%';
callClaude(codeGenHistory,CODE_PROMPT,'code').then(function(raw){
genProgressBar.style.width='90%';codeGenHistory.push({role:'assistant',content:raw});
var parsed;var fence=String.fromCharCode(96,96,96);
try{var j=raw.trim();if(j.indexOf(fence)===0)j=j.replace(new RegExp('^'+fence+'(?:json)?\\s*'),'').replace(new RegExp('\\s*'+fence+'$'),'');parsed=JSON.parse(j);}
catch(e){var m=raw.match(/\{[\s\S]*"files"[\s\S]*\}/);if(m)parsed=JSON.parse(m[0]);else throw new Error('Could not parse code.');}
generatedFiles=parsed.files||[];genProgressBar.style.width='100%';
setTimeout(function(){genProgress.classList.add('hidden');genStatus.textContent=parsed.summary||'Code generated!';activeFileIdx=0;renderFiles();codeOutput.classList.remove('hidden');reviewRow.classList.remove('hidden');setStep(3);speak('Code is ready.');announce('Code generated. Review and approve or tweak.');},400);
}).catch(function(err){genProgress.classList.add('hidden');genStatus.classList.add('hidden');showError('Code error: '+err.message,'retry');});
}
function renderFiles(){fileTabs.innerHTML='';for(var i=0;i<generatedFiles.length;i++){(function(idx){var t=document.createElement('button');t.className='tab'+(idx===activeFileIdx?' active':'');t.textContent=generatedFiles[idx].name;t.addEventListener('click',function(){activeFileIdx=idx;renderFiles();});fileTabs.appendChild(t);})(i);}var f=generatedFiles[activeFileIdx];if(f){fileDesc.textContent=f.description||'';codeContent.textContent=f.content;codeContent.className='';if(f.language)codeContent.classList.add('language-'+f.language);hljs.highlightElement(codeContent);}}

/* ===== REVIEW ===== */
var blobURLs=[];
approveBtn.addEventListener('click',function(){
setStep(4);downloadPanel.classList.remove('hidden');downloadLinks.innerHTML='';tweakBar.classList.add('hidden');
blobURLs.forEach(function(u){URL.revokeObjectURL(u)});blobURLs=[];
for(var i=0;i<generatedFiles.length;i++){var f=generatedFiles[i];var blob=new Blob([f.content],{type:'text/plain'});var url=URL.createObjectURL(blob);blobURLs.push(url);var a=document.createElement('a');a.className='dl-tag';a.href=url;a.download=f.name;a.textContent=f.name;downloadLinks.appendChild(a);}
saveProject();speak('Project saved!');announce('Project approved and saved.');downloadPanel.scrollIntoView({behavior:'smooth',block:'nearest'});
});
tweakBtn.addEventListener('click',function(){tweakBar.classList.toggle('hidden');if(!tweakBar.classList.contains('hidden'))tweakInput.focus();});
function sendTweak(){
var text=tweakInput.value.trim();if(!text)return;tweakInput.value='';if(tweakVoice.isOn())tweakVoice.off();
tweakBar.classList.add('hidden');reviewRow.classList.add('hidden');genProgress.classList.remove('hidden');genStatus.classList.remove('hidden');
genStatus.textContent='Applying tweak...';genProgressBar.style.width='30%';codeOutput.classList.add('hidden');speak('Applying changes.');
codeGenHistory.push({role:'user',content:'Modify the code: "'+text+'"\nKeep existing functionality. Respond with SAME JSON format. ONLY valid JSON.'});genProgressBar.style.width='60%';
callClaude(codeGenHistory,CODE_PROMPT,'code').then(function(raw){
codeGenHistory.push({role:'assistant',content:raw});genProgressBar.style.width='90%';
var parsed;var fence=String.fromCharCode(96,96,96);
try{var j=raw.trim();if(j.indexOf(fence)===0)j=j.replace(new RegExp('^'+fence+'(?:json)?\\s*'),'').replace(new RegExp('\\s*'+fence+'$'),'');parsed=JSON.parse(j);}
catch(e){var m=raw.match(/\{[\s\S]*"files"[\s\S]*\}/);if(m)parsed=JSON.parse(m[0]);else throw new Error('Could not parse tweaked code.');}
generatedFiles=parsed.files||[];genProgressBar.style.width='100%';
setTimeout(function(){genProgress.classList.add('hidden');genStatus.textContent='Tweak applied!';activeFileIdx=0;renderFiles();codeOutput.classList.remove('hidden');reviewRow.classList.remove('hidden');downloadPanel.classList.add('hidden');speak('Tweak applied.');},300);
}).catch(function(err){genProgress.classList.add('hidden');genStatus.classList.add('hidden');codeOutput.classList.remove('hidden');reviewRow.classList.remove('hidden');showError('Tweak error: '+err.message,'retry');});
}
tweakSend.addEventListener('click',sendTweak);tweakInput.addEventListener('keydown',function(e){if(e.key==='Enter')sendTweak();});
downloadAllBtn.addEventListener('click',function(){for(var i=0;i<generatedFiles.length;i++){var f=generatedFiles[i];var b=new Blob([f.content],{type:'text/plain'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=f.name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}});

/* ===== IndexedDB + AUTO-PRUNE ===== */
var db=null;var DB_NAME='VoiceToCodeProjects',DB_VER=1,STORE='projects';
function openDB(){return new Promise(function(resolve,reject){var req=indexedDB.open(DB_NAME,DB_VER);req.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id',autoIncrement:true});};req.onsuccess=function(e){db=e.target.result;resolve(db);};req.onerror=function(e){reject(e);};});}
function saveProject(){if(!db)return;var p={name:clarifiedRequirements.replace(/READY TO BUILD\s*/,'').slice(0,80).trim()||'Untitled',files:generatedFiles,conversation:conversationHistory,codeHistory:codeGenHistory,timestamp:Date.now()};var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).add(p);tx.oncomplete=function(){loadProjects();autoPrune();};}
function loadProjects(){if(!db)return;var tx=db.transaction(STORE,'readonly');var req=tx.objectStore(STORE).getAll();req.onsuccess=function(){savedProjects=req.result.sort(function(a,b){return b.timestamp-a.timestamp});renderProjects();};}
/* Auto-prune: delete projects older than 90 days */
function autoPrune(){if(!db)return;var cutoff=Date.now()-(90*24*60*60*1000);var tx=db.transaction(STORE,'readwrite');var store=tx.objectStore(STORE);var req=store.openCursor();req.onsuccess=function(e){var cursor=e.target.result;if(cursor){if(cursor.value.timestamp<cutoff){store.delete(cursor.value.id);}cursor.continue();}};}
function renderProjects(){projectsList.innerHTML='';if(!savedProjects.length){projectsList.innerHTML='<span class="hint">No saved projects</span>';return;}for(var i=0;i<savedProjects.length;i++){(function(p){var chip=document.createElement('div');chip.className='proj';chip.innerHTML='<span class="pn">'+esc(p.name.slice(0,40))+'</span><span class="pt">'+timeAgo(p.timestamp)+'</span>';chip.addEventListener('click',function(){loadProject(p)});var del=document.createElement('span');del.className='px';del.textContent='\u2715';del.addEventListener('click',function(ev){ev.stopPropagation();deleteProject(p.id);});chip.appendChild(del);projectsList.appendChild(chip);})(savedProjects[i]);}}
function loadProject(p){fullReset();conversationHistory=p.conversation||[];codeGenHistory=p.codeHistory||[];generatedFiles=p.files||[];clarifiedRequirements=p.name;if(generatedFiles.length){codePanel.classList.remove('hidden');codeOutput.classList.remove('hidden');reviewRow.classList.remove('hidden');genStatus.classList.remove('hidden');genStatus.textContent='Loaded: '+p.name;activeFileIdx=0;renderFiles();setStep(3);speak('Loaded: '+p.name);}if(conversationHistory.length){chatPanel.classList.remove('hidden');for(var i=0;i<conversationHistory.length;i++){var m=conversationHistory[i];addBbl(m.role==='user'?'user':'ai',m.content);}}}
function deleteProject(id){if(!db)return;var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);tx.oncomplete=function(){loadProjects()};}
clearProjectsBtn.addEventListener('click',function(){if(!db)return;var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).clear();tx.oncomplete=function(){loadProjects()};});
function timeAgo(ts){var s=Math.floor((Date.now()-ts)/1000);if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ===== RESET ===== */
function fullReset(){chatPanel.classList.add('hidden');replyBar.classList.add('hidden');generateBtn.classList.add('hidden');codePanel.classList.add('hidden');downloadPanel.classList.add('hidden');tweakBar.classList.add('hidden');reviewRow.classList.add('hidden');chatArea.innerHTML='';conversationHistory=[];codeGenHistory=[];awaitingReply=false;generatedFiles=[];activeFileIdx=0;finalText='';lastInterim='';clarifiedRequirements='';ideaInput.value='';transcriptEl.innerHTML='<span class="hint">Speak or type your idea...</span>';updateSendBtn();statusEl.textContent='Tap the orb to speak';genStatus.classList.add('hidden');setStep(0);hideError();if(synth)synth.cancel();speakingIndicator.classList.remove('active');}
resetChat.addEventListener('click',fullReset);resetChat2.addEventListener('click',fullReset);

/* ===== PAGE VISIBILITY LIFECYCLE ===== */
document.addEventListener('visibilitychange',function(){
if(document.hidden){
/* Pause everything when page goes to background */
if(listening){wantListening=false;try{recognition.stop();}catch(e){}}
stopVolumeMeter();
if(synth)synth.cancel();speakingIndicator.classList.remove('active');isSpeaking=false;
/* Pause CSS animations */
document.body.style.setProperty('--pause','paused');
}else{
document.body.style.setProperty('--pause','running');
checkOnline();
}
});

/* ===== UI HELPERS ===== */
function addBbl(type,text){var div=document.createElement('div');div.className='bbl '+type;if(type!=='system'){var w=document.createElement('div');w.className='tag';w.textContent=type==='ai'?'Claude':'You';div.appendChild(w);}var body=document.createElement('div');body.textContent=text;div.appendChild(body);chatArea.appendChild(div);chatArea.scrollTop=chatArea.scrollHeight;pruneChat();return div;}
function addStreamBbl(){var div=document.createElement('div');div.className='bbl ai';var w=document.createElement('div');w.className='tag';w.textContent='Claude';div.appendChild(w);var body=document.createElement('div');div.appendChild(body);chatArea.appendChild(div);var renderer=new StreamRenderer(body);return{el:div,push:function(text){renderer.push(text)}};}
function addDots(){var div=document.createElement('div');div.className='bbl ai dots';div.innerHTML='<span></span><span></span><span></span>';chatArea.appendChild(div);chatArea.scrollTop=chatArea.scrollHeight;return div;}
/* Cap conversation DOM at 50 messages */
function pruneChat(){var msgs=chatArea.querySelectorAll('.bbl');if(msgs.length>50){for(var i=0;i<msgs.length-50;i++)msgs[i].remove();}}
function showError(msg,action){errorEl.innerHTML='';var t=document.createElement('span');t.textContent=msg;errorEl.appendChild(t);
if(action==='retry'){var btn=document.createElement('button');btn.textContent='Try Again';btn.addEventListener('click',function(){hideError();});errorEl.appendChild(btn);}
errorEl.classList.add('visible');}
function hideError(){errorEl.classList.remove('visible');}

/* ===== INIT ===== */
setStep(0);updateSendBtn();openDB().then(function(){loadProjects();autoPrune();}).catch(function(){});
})();
</script>
</body>
</html>
